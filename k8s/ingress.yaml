apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: procurement-pal-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
    - hosts:
        - app.yourdomain.com
      secretName: procurement-pal-tls
  rules:
    - host: app.yourdomain.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: procurement-pal-service
                port:
                  number: 80
