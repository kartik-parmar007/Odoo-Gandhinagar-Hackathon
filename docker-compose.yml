version: '3.8'

services:
  # 1. TanStack Start React Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
        - VITE_SUPABASE_PUBLISHABLE_KEY=${VITE_SUPABASE_PUBLISHABLE_KEY}
    image: procurement-pal:latest
    container_name: procurement-pal-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    env_file:
      - .env
    networks:
      - devops-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 2. Nginx Reverse Proxy (Routes traffic & handles SSL template)
  nginx:
    image: nginx:alpine
    container_name: devops-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      # For SSL certificates in production (shared with Let's Encrypt certbot container if needed)
      # - ./certs:/etc/nginx/certs:ro
    depends_on:
      - app
    networks:
      - devops-network

  # 3. Prometheus (Monitoring Metrics Scraper)
  prometheus:
    image: prom/prometheus:latest
    container_name: devops-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - devops-network

  # 4. Grafana (Metrics Dashboard visualization)
  grafana:
    image: grafana/grafana:latest
    container_name: devops-grafana
    restart: unless-stopped
    ports:
      - "3001:3000" # Maps Grafana UI to port 3001 on the host to avoid conflict
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - devops-network

volumes:
  prometheus-data:
  grafana-data:

networks:
  devops-network:
    driver: bridge
